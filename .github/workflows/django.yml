name: Django Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositori
        uses: actions/checkout@v3

      - name: Instal·lar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: |
          python -m pip install --upgrade pip
          pip install django

      - name: Executar migracions
        run: python manage.py migrate

      - name: Executar tests
        run: python manage.py test

  docs:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clonar el repositori
        uses: actions/checkout@v3

      - name: Instal·lar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: |
          python -m pip install --upgrade pip
          pip install django

      - name: Generar documentació amb Pydoc
        run: |
          mkdir -p docs
          python -m pydoc -w blog.models
          python -m pydoc -w blog.views
          mv blog.models.html docs/
          mv blog.views.html docs/
          echo "<html><body><h1>Documentació del Blog Django</h1><ul><li><a href='blog.models.html'>Models</a></li><li><a href='blog.views.html'>Views</a></li></ul></body></html>" > docs/index.html

      - name: Publicar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs