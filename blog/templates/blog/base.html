<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="{% url 'starting-page' %}">Blog</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'starting-page' %}">INICI</a>
            <a class="nav-link" href="{% url 'posts-page' %}">POSTS</a>
            <a class="nav-link" href="{% url 'authors-page' %}">AUTORS</a>
            <a class="nav-link" href="{% url 'tags-page' %}">TAGS</a>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-3 bg-secondary text-white mt-4">
        <p class="mb-0">© 2024 Copyright: Blog de Django</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
