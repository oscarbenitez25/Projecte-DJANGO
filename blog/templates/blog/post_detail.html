{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2>{{ post.title }}</h2>
            <p class="text-muted">{{ post.date }} - 
                <a href="#">{{ post.author }}</a>
            </p>
            <hr>
            {% if post.imatge %}
                <div class="post-image" style="margin-bottom: 20px;">
                    <img src="{{ post.imatge.url }}" alt="{{ post.titol }}" style="max-width: 100%; height: auto; border-radius: 8px;">
                </div>
            {% endif %}
            <p>{{ post.content }}</p>
        </div>
    </div>
{% endblock %}
