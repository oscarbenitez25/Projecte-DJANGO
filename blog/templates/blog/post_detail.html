{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2>{{ post.title }}</h2>
            <p class="text-muted">{{ post.date }} - 
                <a href="#">{{ post.author }}</a>
            </p>
            <hr>
            <p>{{ post.content }}</p>
        </div>
    </div>
{% endblock %}
